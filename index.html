<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>📋 Minhas Tarefas</h1>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="Digite uma tarefa..." required>
      <button type="submit">Adicionar</button>
    </form>

    <div class="filters">
      <button onclick="filterTasks('all')">Todas</button>
      <button onclick="filterTasks('done')">Concluídas</button>
      <button onclick="filterTasks('pending')">Pendentes</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
